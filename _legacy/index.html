<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midland Meetups — Happenings This Week</title>
<meta name="description" content="A one-week snapshot of upcoming Midland Meetups events.">
<link rel="stylesheet" href="style.css">
</head>
<body data-page="index">

<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">
      <svg class="mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="15" cy="16" r="11" fill="#2851E3" opacity="0.9"/>
        <circle cx="25" cy="16" r="11" fill="#E5484D" opacity="0.85"/>
        <circle cx="20" cy="25" r="11" fill="#F6B93B" opacity="0.85"/>
      </svg>
      <span class="brand-title">Midland Meetups</span>
    </a>
    <button class="nav-toggle" id="nav-toggle" type="button" aria-expanded="false" aria-controls="main-nav" aria-label="Toggle navigation menu">
      <svg class="icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      <svg class="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <nav class="main-nav" id="main-nav" aria-label="Primary"></nav>
  </div>
</header>

<div class="ticker-wrap" id="ticker-wrap">
  <div class="ticker-track" id="ticker-track">
    <span>Loading updates…</span>
  </div>
</div>

<main class="page">
  <div class="page-head">
    <div class="page-kicker">Next 7 days</div>
    <h1 class="page-title">Happenings This Week</h1>
    <p class="page-lede">Everything on the books between now and next week. Tap any card for the full details, host info, and to let people know if you're going.</p>
  </div>

  <section class="grid" id="grid" aria-label="This week's events">
    <div class="empty-note">Loading the week…</div>
  </section>
</main>

<div class="modal-overlay" id="modal-overlay" aria-hidden="true">
  <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
</div>

<footer class="site-footer">
  Midland Meetups &middot; a bulletin board for the crew &middot; Midland, MI
</footer>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
