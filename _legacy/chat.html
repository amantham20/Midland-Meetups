<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat — Midland Meetups</title>
<meta name="description" content="Chat with the Midland Meetups crew.">
<link rel="stylesheet" href="style.css">
</head>
<body data-page="chat">

<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">
      <svg class="mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="15" cy="16" r="11" fill="#2851E3" opacity="0.9"/>
        <circle cx="25" cy="16" r="11" fill="#E5484D" opacity="0.85"/>
        <circle cx="20" cy="25" r="11" fill="#F6B93B" opacity="0.85"/>
      </svg>
      <span class="brand-title">Midland Meetups</span>
    </a>
    <button class="nav-toggle" id="nav-toggle" type="button" aria-expanded="false" aria-controls="main-nav" aria-label="Toggle navigation menu">
      <svg class="icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      <svg class="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <nav class="main-nav" id="main-nav" aria-label="Primary"></nav>
  </div>
</header>

<main class="page">
  <div class="page-head">
    <div class="page-kicker">Say something</div>
    <h1 class="page-title">Chat</h1>
    <p class="page-lede">A shared, open chat for the group — no account needed, just a name. Refreshes on its own every few seconds.</p>
  </div>

  <div class="form-card" id="chat-gate">
    <div class="form-row">
      <label for="chat-gate-password">Password</label>
      <input type="password" id="chat-gate-password" placeholder="Ask the organizer if you don't have it">
    </div>
    <button type="button" class="btn" id="chat-gate-submit">Unlock</button>
    <p class="form-note" id="chat-gate-status"></p>
  </div>

  <div id="chat-content" style="display:none;">
    <div class="chat-window" id="chat-window">
      <div class="empty-note">Loading messages…</div>
    </div>

    <form class="chat-form" id="chat-form">
      <input type="text" name="name" placeholder="Your name" required maxlength="40">
      <input type="text" name="message" placeholder="Say something…" required maxlength="500" autocomplete="off">
      <button type="submit" class="btn">Send</button>
    </form>
  </div>
</main>

<footer class="site-footer">
  Midland Meetups &middot; a bulletin board for the crew &middot; Midland, MI
</footer>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
